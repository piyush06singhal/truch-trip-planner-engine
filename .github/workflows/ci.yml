name: CI/CD Production Pipeline Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-validation:
    name: Frontend Lint & Build Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Node Packages
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run ESLint Linter Check
        working-directory: ./frontend
        run: npm run lint

      - name: Run Production Bundle Build
        working-directory: ./frontend
        run: npm run build

  backend-validation:
    name: Backend Test & Compile Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Python Requirements
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Backend Python Scripts
        working-directory: ./backend
        run: python -m py_compile manage.py config/*.py trip_planner/*.py trip_planner/**/*.py

      - name: Run Django System Unit Tests
        working-directory: ./backend
        run: python manage.py test
